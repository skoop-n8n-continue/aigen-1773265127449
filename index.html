<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Weather Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;700&display=swap&v=m7x9q2" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=m7x9q2">
</head>
<body>

  <!-- Animated sky background layers -->
  <div class="sky-bg" id="skyBg">
    <div class="stars" id="stars"></div>
    <div class="clouds-layer" id="cloudsLayer"></div>
    <div class="rain-layer" id="rainLayer"></div>
    <div class="snow-layer" id="snowLayer"></div>
    <div class="lightning-layer" id="lightningLayer"></div>

  <div class="card" id="card">
    <div class="left-panel">
      <!-- Location -->
      <div class="location-row" id="locationRow">
        <svg class="pin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <span class="location-text" id="locationText">Locating…</span>
      </div>

      <!-- Date & Time -->
      <div class="datetime-block">
        <div class="time" id="timeDisplay">--:--</div>
        <div class="date" id="dateDisplay">---</div>
      </div>
    </div>

    <div class="right-panel">
      <!-- Weather icon -->
      <div class="icon-wrap" id="iconWrap">
        <div class="weather-icon" id="weatherIcon">
          <div class="icon-spinner"></div>
        </div>
      </div>

      <!-- Temperature -->
      <div class="temp-block">
        <span class="temp-value" id="tempValue">--</span>
        <span class="temp-unit" id="tempUnit">°C</span>
      </div>

      <!-- Condition label -->
      <div class="condition" id="condition">Fetching weather…</div>
    </div>
  </div>

  <script src="app.js?v=m7x9q2"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
